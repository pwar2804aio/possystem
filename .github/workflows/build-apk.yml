name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Update version code
        run: |
          # Use GitHub run number as version code for unique builds
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             artifacts/RestaurantOS-v1.${{ github.run_number }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RestaurantOS-APK
          path: artifacts/RestaurantOS-*.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.${{ github.run_number }}
          name: Restaurant OS APK v1.${{ github.run_number }}
          body: |
            ## Restaurant OS — Android APK
            
            **Install on Sunmi:**
            1. Download the `.apk` file below
            2. Transfer to Sunmi device via USB or email/cloud
            3. On Sunmi: Settings → Security → Allow unknown sources
            4. Open the APK file to install
            5. Launch **Restaurant OS** from the home screen
            
            Loads: `possystem-liard.vercel.app/?mode=pos`
            
            Built from commit: ${{ github.sha }}
          files: artifacts/RestaurantOS-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
